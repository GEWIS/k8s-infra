apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  targetNamespace: observability
  releaseName: loki
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "13.5.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  values:
    deploymentMode: SingleBinary

    minio:
      enabled: false
    lokiCanary:
      enabled: false
    resultsCache:
      enabled: false
    chunksCache:
      enabled: false

    test:
      enabled: false

    loki:
      auth_enabled: true
      commonConfig:
        replication_factor: 1
        path_prefix: /var/loki
      storage:
        type: filesystem
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      schemaConfig:
        configs:
          - from: "2026-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index: { prefix: index_, period: 24h }
      podSecurityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsUser: 10001

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
        storageClass: longhorn

    gateway:
      enabled: true

    # disable all default stuff
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0
