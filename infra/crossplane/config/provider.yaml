apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-sql
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-sql:v0.9.0
---
# ProviderConfig is applied after provider-sql installs its CRDs.
# Flux will retry until the CRD is available (retryInterval on crossplane-config Kustomization).
apiVersion: postgresql.sql.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: db-provider
spec:
  credentials:
    source: PostgreSQLConnectionURI
    connectionSecretRef:
      namespace: postgres
      name: postgres-superuser
