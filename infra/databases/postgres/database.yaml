apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17

  inheritedMetadata:
    labels:
      recurring-job.longhorn.io/source: enabled
      recurring-job.longhorn.io/fs-trim: enabled

  storage:
    size: 20Gi

  backup:
    volumeSnapshot:
      className: longhorn-backup-vsc
