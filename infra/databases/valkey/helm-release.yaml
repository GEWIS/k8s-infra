apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: flux-system
spec:
  targetNamespace: valkey
  chart:
    spec:
      chart: valkey
      version: 0.9.4
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
  interval: 1h
  install:
    createNamespace: true
  values:
    replica:
      replicas: 2 # 1 Master + 2 Read only
      enabled: true
      persistence:
        size: 5Gi
      minReplicasToWrite: 1
      minReplicasMaxLag: 10
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
